<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-label="Michael Cardoza — Autonomous Systems Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="redPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E10600"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE600"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- subtle grid lines (HUD feel) -->
  <g stroke="#222" stroke-width="1">
    <line x1="0" y1="80"  x2="1200" y2="80"/>
    <line x1="0" y1="260" x2="1200" y2="260"/>
  </g>

  <!-- red Zeon-style angled panel, left side -->
  <polygon points="0,0 460,0 360,340 0,340" fill="url(#redPanel)"/>
  <polygon points="380,0 420,0 320,340 280,340" fill="#0a0a0a" opacity="0.55"/>
  <polygon points="430,0 450,0 350,340 330,340" fill="#FFD600" opacity="0.85"/>

  <!-- Zaku II head silhouette (stylized, front view) -->
  <g transform="translate(90,90)">
    <!-- helmet shell -->
    <path d="M 30,10 L 170,10 L 195,55 L 195,150 L 175,180 L 25,180 L 5,150 L 5,55 Z"
          fill="#1a1a1a" stroke="#000" stroke-width="3"/>
    <!-- crown plate -->
    <path d="M 50,10 L 150,10 L 140,28 L 60,28 Z" fill="#2b2b2b"/>
    <!-- visor slot (black bar) -->
    <rect x="15" y="78" width="170" height="30" fill="#000" rx="3"/>
    <rect x="15" y="78" width="170" height="6" fill="#333"/>
    <!-- mono-eye (the iconic single eye) -->
    <g filter="url(#glow)">
      <circle cx="115" cy="93" r="11" fill="#FFD600"/>
      <circle cx="115" cy="93" r="6" fill="#FF1A1A"/>
      <circle cx="113" cy="91" r="2" fill="#fff"/>
    </g>
    <!-- mouth grill / vents -->
    <g fill="#0a0a0a" stroke="#444" stroke-width="1">
      <rect x="60" y="130" width="80" height="6"/>
      <rect x="60" y="142" width="80" height="6"/>
      <rect x="60" y="154" width="80" height="6"/>
    </g>
    <!-- side antenna spike -->
    <polygon points="195,40 230,20 200,55" fill="#FFD600" stroke="#000" stroke-width="2"/>
    <!-- shoulder pipe hint -->
    <circle cx="10"  cy="60" r="6" fill="#2b2b2b" stroke="#000"/>
    <circle cx="190" cy="60" r="6" fill="#2b2b2b" stroke="#000"/>
  </g>

  <!-- decorative thunderbolts -->
  <g stroke="#000" stroke-width="2" stroke-linejoin="miter">
    <path d="M 980,30 L 940,110 L 970,110 L 920,200 L 1000,100 L 970,100 L 1010,30 Z" fill="url(#bolt)"/>
    <path d="M 1110,200 L 1080,250 L 1100,250 L 1070,310 L 1130,240 L 1108,240 L 1135,200 Z" fill="url(#bolt)"/>
    <path d="M 820,250 L 800,290 L 815,290 L 795,330 L 835,285 L 818,285 L 840,250 Z" fill="url(#bolt)" opacity="0.85"/>
  </g>

  <!-- name + tagline -->
  <g font-family="Impact, 'Arial Black', sans-serif">
    <text x="500" y="120" font-size="62" fill="#FFD600" letter-spacing="4">MICHAEL CARDOZA</text>
    <text x="502" y="122" font-size="62" fill="#E10600" letter-spacing="4" opacity="0.35">MICHAEL CARDOZA</text>
  </g>
  <text x="500" y="160" font-family="'Courier New', monospace" font-size="20" fill="#f0f0f0" letter-spacing="2">
    AUTONOMOUS SYSTEMS · AI INFRASTRUCTURE · DEFENSE TECH
  </text>
  <text x="500" y="195" font-family="'Courier New', monospace" font-size="14" fill="#E10600" letter-spacing="3">
    [ VULTUREOS  //  XIAOS  //  SLAYER-VAULT  //  DRIFTLESS ]
  </text>

  <!-- status pill: open for contracts -->
  <g transform="translate(500,225)">
    <rect width="280" height="36" rx="4" fill="#0a0a0a" stroke="#FFD600" stroke-width="2"/>
    <circle cx="20" cy="18" r="6" fill="#39FF14">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="38" y="24" font-family="'Courier New', monospace" font-size="14" fill="#FFD600" letter-spacing="2">
      STATUS: OPEN FOR CONTRACTS
    </text>
  </g>

  <!-- callsign block -->
  <g transform="translate(500,280)" font-family="'Courier New', monospace" font-size="12" fill="#888">
    <text x="0"   y="14">CALLSIGN_ZAKU-II  //  PILOT: M.CARDOZA</text>
    <text x="0"   y="32">SECTOR: SMB → ENTERPRISE  //  COMMS: cardozaservices.com</text>
  </g>

  <!-- corner stencil marks -->
  <g fill="#FFD600" font-family="'Courier New', monospace" font-size="11" letter-spacing="2">
    <text x="20"   y="25">MS-06 // FIELD OPS</text>
    <text x="1080" y="330" text-anchor="start">v.2026.05</text>
  </g>
</svg>
